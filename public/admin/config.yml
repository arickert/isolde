backend:
  name: github
  repo: arickert/isolde
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "string", required: false }
      - label: "Show Status"
        name: "status"
        widget: "select"
        required: false
        hint: "For shows only. Auto-assigns icon and nav row. Leave blank for info/press pages."
        options:
          - { label: "Current", value: "current" }
          - { label: "Future", value: "future" }
          - { label: "Past", value: "past" }
      - { label: "Icon Override", name: "icon", widget: "string", required: false, hint: "Override auto icon. Text character or SVG path (e.g. /icons/construction.svg)" }
      - { label: "Display Order", name: "order", widget: "number", default: 0, hint: "Lower numbers appear first" }
      - { label: "Window Width (px)", name: "width", widget: "number", default: 678 }
      - label: "Navigation Row Override"
        name: "row"
        widget: "select"
        required: false
        hint: "Override auto placement. Only needed for info/press pages."
        options:
          - { label: "Current Shows", value: "current" }
          - { label: "Past Shows", value: "past" }
          - { label: "Info / Press", value: "info" }
      - label: "Images"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }
